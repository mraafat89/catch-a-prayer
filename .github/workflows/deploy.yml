name: Deploy to Production

# Manual trigger only — you decide when production gets updated
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm'
        required: true
        type: string

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "deploy" ]; then
            echo "❌ You must type 'deploy' to confirm"
            exit 1
          fi

  test-backend:
    name: Backend Tests
    needs: [validate]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_DB: catchaprayer_test
          POSTGRES_USER: cap
          POSTGRES_PASSWORD: cap
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U cap"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://cap:cap@localhost:5432/catchaprayer_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip', cache-dependency-path: server/requirements.txt }
      - run: cd server && pip install -r requirements.txt
      - run: cd server && python -m pytest tests/ -v --timeout=30

  test-frontend:
    name: Frontend Tests
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '18', cache: 'npm', cache-dependency-path: client/package-lock.json }
      - run: cd client && npm ci
      - run: cd client && CI=true npm test -- --watchAll=false

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd ${{ secrets.PROD_PATH || '/opt/catch-a-prayer' }}
            git fetch origin main
            git checkout main
            git pull origin main
            cd server && alembic upgrade head && cd ..
            docker-compose -f docker-compose.prod.yml up -d --build api
            echo "✅ Deployed $(git rev-parse --short HEAD) at $(date)"
