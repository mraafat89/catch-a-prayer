name: Release & Deploy

# Triggered manually from GitHub Actions tab
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 0.10.0, 1.0.0)'
        required: true
        type: string
      release_type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - minor
          - major
      release_notes:
        description: 'Release notes (what changed)'
        required: true
        type: string

jobs:
  # 1. Run tests first
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_DB: catchaprayer_test
          POSTGRES_USER: cap
          POSTGRES_PASSWORD: cap
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U cap"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://cap:cap@localhost:5432/catchaprayer_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip', cache-dependency-path: server/requirements.txt }
      - run: cd server && pip install -r requirements.txt
      - run: cd server && python -m pytest tests/ -v --timeout=30

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '18', cache: 'npm', cache-dependency-path: client/package-lock.json }
      - run: cd client && npm ci
      - run: cd client && CI=true npm test -- --watchAll=false

  # 2. Create release + tag
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Generate changelog
        id: changelog
        run: |
          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline --no-merges | head -20)
          else
            COMMITS=$(git log --oneline --no-merges ${LAST_TAG}..HEAD | head -20)
          fi
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ inputs.version }}"
          name: "v${{ inputs.version }}"
          body: |
            ## What's New

            ${{ inputs.release_notes }}

            ## Release Type
            **${{ inputs.release_type }}** release

            ## Commits
            ${{ steps.changelog.outputs.commits }}

            ---
            Full changelog: https://github.com/mraafat89/catch-a-prayer/compare/v${{ inputs.version }}...main
          draft: false
          prerelease: ${{ inputs.release_type == 'minor' && contains(inputs.version, '0.') }}

  # 3. Deploy to production server
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd ${{ secrets.PROD_PATH || '/opt/cap' }}
            # NEVER use git reset --hard — it deletes .env files
            git config pull.rebase false
            git fetch origin main --tags
            git checkout main
            git pull --no-edit origin main || (git stash && git pull --no-edit origin main)
            # Verify .env exists (critical for DB connection)
            test -f server/.env || (echo "ERROR: server/.env missing!" && exit 1)
            docker exec cap-api alembic upgrade head || true
            docker compose -f docker-compose.prod.yml up -d --build api
            cd client && REACT_APP_API_URL=https://catchaprayer.com npm run build
            echo "✅ Client rebuilt"
            echo "✅ Deployed v${{ inputs.version }} at $(date)"
