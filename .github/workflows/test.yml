name: Tests

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_DB: catchaprayer_test
          POSTGRES_USER: cap
          POSTGRES_PASSWORD: cap
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cap -d catchaprayer_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://cap:cap@localhost:5432/catchaprayer_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: server/requirements.txt

      - name: Install dependencies
        run: |
          cd server
          pip install -r requirements.txt

      - name: Run unit tests
        run: cd server && python -m pytest tests/unit/ -v --timeout=30

      - name: Run integration tests
        run: cd server && python -m pytest tests/integration/ -v --timeout=30

      - name: Run feature tests
        run: cd server && python -m pytest tests/feature/ -v --timeout=60

      - name: Run NFR tests
        run: cd server && python -m pytest tests/nfr/ -v --timeout=30

  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: cd client && npm ci

      - name: Run tests
        run: cd client && CI=true npm test -- --watchAll=false
        timeout-minutes: 5
